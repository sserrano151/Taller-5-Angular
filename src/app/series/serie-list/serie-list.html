<div class="container mt-4">
  <h2>Series de TV</h2>
  <div class="row">
    <div class="col-8">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Canal</th>
            <th>Temporadas</th>
          </tr>
        </thead>
        <tbody>
          @for (s of series; track s.id) {
            <tr>
              <td>{{ s.id }}</td>
              <td><a href="#" (click)="selectSerie(s); $event.preventDefault()">{{ s.name }}</a></td>
              <td>{{ s.channel }}</td>
              <td [class.text-danger]="s.seasons > 6"><strong>{{ s.seasons }}</strong></td>
            </tr>
          }
        </tbody>
      </table>
      <p><strong>Promedio de temporadas:</strong> {{ averageSeasons.toFixed(2) }}</p>
    </div>
    <div class="col-4">
      @if (selectedSerie) {
        <div class="card">
          <img [src]="selectedSerie.poster" class="card-img-top" alt="{{ selectedSerie.name }}">
          <div class="card-body">
            <h5 class="card-title">{{ selectedSerie.name }}</h5>
            <p class="card-text">{{ selectedSerie.description }}</p>
            <a [href]="selectedSerie.webpage" target="_blank" class="btn btn-primary">Ir a la página</a>
          </div>
        </div>
      }
    </div>
  </div>
</div>
